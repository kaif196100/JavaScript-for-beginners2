<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello world </h1>
    <script>
         // indexOf Method
        const name = ['Florin', 'Ivan', 'Liam'];
        console.log(name.indexOf('Ivan'));
         //  add new name
         
        const names = ['Florin', 'Ivan', 'Liam'];

        const idx = names.indexOf('Ivan');

        names[idx] = 'jay';
        console.log(idx, names);

        // lastIndexOf method

        const Name = ['Florin', 'Ivan', 'Liam', 'Ivan'];

        const idex = Name.lastIndexOf('Ivan');
            
        console.log(idex, Name);
    </script>
</body>
</html>
