<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello world</h1>
    <script>
        // trim 
       const  string1= '  hello world  ';
       const res =  string1.trim()
       console.log(res);  

        // trimStart 
        const string2 = "  hello world  ";
        const re =  string2.trimStart()
        console.log(re);

        //trimEnd
        const string3 = '   hello world  ';
        const va =  string3.trimEnd()
        console.log(va);
    </script>
</body>
</html>
