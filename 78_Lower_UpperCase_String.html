<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <script>
        // UpperCase
        const text = 'hello world';
        const str = text.toUpperCase();
        console.log(str)

        // LowerCase

        const text1 = 'HELLO WORLD';
        const str1 = text1.toLowerCase();
        console.log(str1)

        //
        const Upper = 'istanbul';
        const str2 = Upper.toLocaleUpperCase('tr');
        console.log(str2)

        const lower = 'HELLO WORLD';
        const str3 = lower.toLocaleLowerCase('US');
        console.log(str3)


    </script>
</body>
</html>
