<body>
    <h1>hello world</h1>
    <script>
        // sum code
        const number = [1, 2, 3, 4, 5,];

        const total = number.reduce(sum)
        function sum(sumof, value) {
            return sumof + value;
        }
        console.log(total);

        //maximum number code
        const numbers = [1, 2, 3, 4, 5];

        const max = numbers.reduce(callback, -Infinity)

        function callback(sumof, value) {
            if (sumof > value) {
                return sumof;
            } else {
                return value;
            }

        }
        console.log(max);
  
        // sum code
        const store = [
        {
            product: 'leptop',
            value: 1000,
            count: 3
        },
        {
            product: 'desktop',
            value: 1500,
            count: 2
        },
        {
            product: 'mobile',
            value: 500,
            count: 1
        },
        ];
         const totalValueStore = store.reduce(
            (acc, item) => acc +item.value * item.count, 0
         );
         console.log(totalValueStore);

    </script>
